<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Perfect Box - Proba Layout</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 20px;
            background: #f4f4f4;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .flex-container {
            height: 80vh;
            border: 8px double #333;
            background: #ffffff;
            position: relative; /* important pentru poziționare */
            margin-bottom: 60px;
        }

        .box {
            width: 130px;
            height: 130px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
            position: absolute; /* control geometric */
        }

        /* BOX 1 - stânga sus */
        .box-1 {
            background: #e74c3c;
            top: 20px;
            left: 20px;
        }

        /* BOX 2 - centru perfect */
        .box-2 {
            background: #3498db;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* BOX 3 - dreapta jos */
        .box-3 {
            background: #2ecc71;
            bottom: 20px;
            right: 20px;
        }

      
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            background: rgba(52, 152, 219, 0.2);
            padding: 30px;
            border-radius: 12px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .grid-item {
            background: #2c3e50;
            color: white;
            padding: 40px 20px;
            text-align: center;
            border-radius: 8px;
            font-size: 1.3rem;
            font-weight: bold;
        }

        /* primul element ocupă 2 coloane */
        .grid-item-1 {
            grid-column: 1 / -1;
            background: #8e44ad;
            height: 160px;
        }
    </style>
</head>

<body>
    <h1>The Perfect Box</h1>

    <h2>A. Provocarea Flexbox</h2>
    <div class="flex-container">
        <div class="box box-1">BOX 1<br>Stânga-Sus</div>
        <div class="box box-2">BOX 2<br>CENTRU</div>
        <div class="box box-3">BOX 3<br>Dreapta-Jos</div>
    </div>

    <h2>B. Provocarea Grid (Sistem Mozaic)</h2>
    <div class="grid-container">
        <div class="grid-item grid-item-1">Element 1 - Full Width</div>
        <div class="grid-item">Element 2</div>
        <div class="grid-item">Element 3</div>
   
    </div>

</body>
</html>
